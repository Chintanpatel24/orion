<svg xmlns="http://www.w3.org/2000/svg" width="1040" height="300" viewBox="0 0 1040 300" role="img" aria-label="Orion IDE logo">
  <defs>
    <linearGradient id="bg" x1="42" y1="42" x2="258" y2="258">
      <stop offset="0" stop-color="#1e293b"/>
      <stop offset="1" stop-color="#0f172a"/>
    </linearGradient>

    <linearGradient id="ringA" x1="76" y1="110" x2="224" y2="190">
      <stop offset="0" stop-color="#e2e8f0"/>
      <stop offset="0.5" stop-color="#94a3b8"/>
      <stop offset="1" stop-color="#64748b"/>
    </linearGradient>

    <linearGradient id="ringB" x1="224" y1="110" x2="76" y2="190">
      <stop offset="0" stop-color="#cbd5e1"/>
      <stop offset="0.5" stop-color="#7c8aa0"/>
      <stop offset="1" stop-color="#475569"/>
    </linearGradient>

    <linearGradient id="word" x1="310" y1="84" x2="640" y2="196">
      <stop offset="0" stop-color="#f8fafc"/>
      <stop offset="1" stop-color="#cbd5e1"/>
    </linearGradient>

    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#000000" flood-opacity="0.32"/>
    </filter>
  </defs>

  <rect width="1040" height="300" rx="42" fill="none"/>

  <g filter="url(#shadow)">
    <rect x="42" y="42" width="216" height="216" rx="56" fill="url(#bg)"/>
    <ellipse cx="150" cy="150" rx="80" ry="34" fill="none" stroke="url(#ringA)" stroke-width="10" transform="rotate(-30 150 150)"/>
    <ellipse cx="150" cy="150" rx="80" ry="34" fill="none" stroke="url(#ringB)" stroke-width="10" transform="rotate(35 150 150)"/>
  </g>

  <g font-family="Inter, Segoe UI, Arial, sans-serif">
    <text x="306" y="146" font-size="78" font-weight="800" letter-spacing="-3" fill="url(#word)">Orion</text>
    <text x="310" y="190" font-size="25" font-weight="600" letter-spacing="0.3" fill="#94a3b8">IDE not for you, but for your agents</text>
    <path d="M312 215H654" stroke="#64748b" stroke-width="5" stroke-linecap="round"/>
  </g>
</svg>
