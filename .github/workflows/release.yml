name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.artifact }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact: orion-linux-x86_64
            binary: target/release/orion
            archive: orion-linux-x86_64.tar.gz
          - os: windows-latest
            artifact: orion-windows-x86_64
            binary: target/release/orion.exe
            archive: orion-windows-x86_64.zip
          - os: macos-latest
            artifact: orion-macos
            binary: target/release/orion
            archive: orion-macos.tar.gz
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux system packages
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libx11-dev \
            libxi-dev \
            libgl1-mesa-dev \
            libxkbcommon-dev \
            libxkbcommon-x11-dev \
            libwayland-dev \
            libxcb1-dev \
            libxcb-render0-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev

      - name: Build lightweight release
        run: cargo build --release --no-default-features

      - name: Prepare Unix artifact
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "artifacts/${{ matrix.artifact }}"
          cp "${{ matrix.binary }}" "artifacts/${{ matrix.artifact }}/orion"
          cp README.md LICENSE "artifacts/${{ matrix.artifact }}/"
          tar -czf "artifacts/${{ matrix.archive }}" -C artifacts "${{ matrix.artifact }}"

      - name: Prepare Windows artifact
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "artifacts/${{ matrix.artifact }}" | Out-Null
          Copy-Item -Path "${{ matrix.binary }}" -Destination "artifacts/${{ matrix.artifact }}/orion.exe" -Force
          Copy-Item -Path "README.md" -Destination "artifacts/${{ matrix.artifact }}/" -Force
          Copy-Item -Path "LICENSE" -Destination "artifacts/${{ matrix.artifact }}/" -Force
          Compress-Archive -Path "artifacts/${{ matrix.artifact }}" -DestinationPath "artifacts/${{ matrix.archive }}" -Force

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: artifacts/${{ matrix.archive }}

      - name: Upload GitHub release asset
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/${{ matrix.archive }}
