name: Release

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact: orion-linux-x86_64
            binary: target/release/orion
          - os: windows-latest
            artifact: orion-windows-x86_64.exe
            binary: target/release/orion.exe
          - os: macos-latest
            artifact: orion-macos-universal
            binary: target/release/orion
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux system packages
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y pkg-config libx11-dev libxi-dev libgl1-mesa-dev libasound2-dev libgtk-3-dev

      - name: Build
        run: cargo build --release --all-features

      - name: Prepare artifact
        shell: bash
        run: |
          mkdir -p artifacts
          cp "${{ matrix.binary }}" "artifacts/${{ matrix.artifact }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: artifacts/${{ matrix.artifact }}
